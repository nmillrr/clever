<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clever</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Landing Page -->
        <div id="landing" class="screen active">
            <img src="assets/clever-logo.png" alt="Clever Logo" class="logo-image">
            <h1 class="brand-name">clever</h1>
            <button class="primary-button" id="selectSchoolBtn">select your school</button>
            <a href="https://nmillrr.framer.ai/work/dev/clever" target="_blank" class="about-link">about clever</a>
        </div>

        <!-- School Selection Page -->
        <div id="schoolSelection" class="screen">
            <div class="school-selection-container">
                <div class="school-selection-header">
                    <h2>select your school</h2>
                </div>
                <div class="schools-scrollable">
                    <!-- Schools will be dynamically generated -->
                </div>
            </div>
        </div>

        <!-- Confirmation Page -->
        <div id="confirmation" class="screen">
            <div class="school-selection-container">
                <div class="school-selection-header">
                    <h2>select your school</h2>
                </div>
                <div class="confirmation-content">
                    <div id="selectedLogo" class="confirmation-logo"></div>
                    <div id="selectedName" class="confirmation-school-name"></div>
                    <div class="saved-indicator">
                        <span class="saved-text">✅ saved!</span>
                    </div>
                    <div class="confirmation-description">
                        <span id="confirmationFullText">when you encounter an online paywall, clever will check UConn's library to see if you have free student access.</span>
                    </div>
                    <div class="change-link" id="changeSchoolBtn">change schools</div>
                </div>
            </div>
        </div>
    </div>

    <script src="popup.js"></script>
</body>
</html>
