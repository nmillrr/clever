<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Access Extension</title>
  <link rel="stylesheet" href="node_modules/@radix-ui/themes/styles.css">
  <style>
    .hidden {
      display: none;
    }
    
    body {
      width: 360px;
      margin: 0;
      padding: 0;
      font-family: var(--default-font-family);
    }
    
    .logo {
      text-align: center;
      margin: 16px 0;
    }
    
    .logo img {
      height: 48px;
      width: auto;
    }
    
    .spinner {
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top: 2px solid var(--accent-9);
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="radix-themes">
  <div class="rt-Container p-4">
    <div class="logo">
      <img src="../assets/logo.png" alt="Academic Access Extension" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIHJ4PSI1MCIgZmlsbD0iIzJjNmJlZCIvPjxwYXRoIGQ9Ik0zMCA3MEg3ME02NSAzMEw1MCA3ME0zNSAzMEw1MCA3MCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI4IiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiLz48L3N2Zz4='">
    </div>
    <div class="rt-Flex direction="column" align="center" mb="4">
      <div class="rt-Heading size="5" align="center">Academic Access Extension</div>
    </div>
    
    <!-- Setup Section -->
    <div id="setup-section">
      <div class="rt-Card">
        <div id="alert-box" class="rt-CalloutRoot hidden" size="2">
          <div class="rt-CalloutIcon">
            <div class="rt-CalloutIconWrapper">
              <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 1C3.91015 1 1 3.91015 1 7.5C1 11.0899 3.91015 14 7.5 14C11.0899 14 14 11.0899 14 7.5C14 3.91015 11.0899 1 7.5 1ZM7.5 2C10.5376 2 13 4.46243 13 7.5C13 10.5376 10.5376 13 7.5 13C4.46243 13 2 10.5376 2 7.5C2 4.46243 4.46243 2 7.5 2ZM7.5 4.5C7.22386 4.5 7 4.72386 7 5V7.5C7 7.77614 7.22386 8 7.5 8C7.77614 8 8 7.77614 8 7.5V5C8 4.72386 7.77614 4.5 7.5 4.5ZM7 9.5C7 9.22386 7.22386 9 7.5 9C7.77614 9 8 9.22386 8 9.5C8 9.77614 7.77614 10 7.5 10C7.22386 10 7 9.77614 7 9.5Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
            </div>
          </div>
          <div class="rt-CalloutText" id="alert-message"></div>
        </div>
        
        <div id="university-select-container" class="rt-Flex direction="column" gap="3">
          <div class="rt-Flex direction="column" gap="1" mt="3">
            <label class="rt-Text size="2" weight="medium" as="label" htmlFor="university-select">Select your institution</label>
            <select id="university-select" class="rt-Select">
              <option value="">-- Select your university --</option>
              <option value="michigan">University of Michigan</option>
              <option value="harvard">Harvard University</option>
              <option value="stanford">Stanford University</option>
              <option value="mit">Massachusetts Institute of Technology</option>
              <option value="berkeley">UC Berkeley</option>
              <option value="oxford">University of Oxford</option>
              <option value="cambridge">University of Cambridge</option>
              <option value="yale">Yale University</option>
              <option value="princeton">Princeton University</option>
              <option value="custom">Custom Institution...</option>
            </select>
          </div>
          
          <div id="custom-form" class="hidden rt-Flex direction="column" gap="3" mt="3">
            <div class="rt-Flex direction="column" gap="1">
              <label class="rt-Text size="2" weight="medium" as="label" htmlFor="custom-name">Institution Name</label>
              <input type="text" id="custom-name" class="rt-TextFieldInput" placeholder="e.g., University of Example">
            </div>
            
            <div class="rt-Flex direction="column" gap="1">
              <label class="rt-Text size="2" weight="medium" as="label" htmlFor="custom-proxy">Proxy URL or Suffix</label>
              <input type="text" id="custom-proxy" class="rt-TextFieldInput" placeholder="e.g., https://proxy.example.edu/login?url= or .proxy.example.edu">
              <div class="rt-Text size="1" color="gray">Enter your institution's proxy URL prefix or domain suffix.</div>
            </div>
          </div>
          
          <div class="rt-Flex justify="end" mt="4">
            <button id="save-button" class="rt-Button">Save Settings</button>
          </div>
        </div>
        
        <div id="success-message" class="hidden">
          <div class="rt-CalloutRoot variant="success" size="2" mb="3">
            <div class="rt-CalloutIcon">
              <div class="rt-CalloutIconWrapper">
                <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M7.5 1C3.91015 1 1 3.91015 1 7.5C1 11.0899 3.91015 14 7.5 14C11.0899 14 14 11.0899 14 7.5C14 3.91015 11.0899 1 7.5 1ZM7.5 2C10.5376 2 13 4.46243 13 7.5C13 10.5376 10.5376 13 7.5 13C4.46243 13 2 10.5376 2 7.5C2 4.46243 4.46243 2 7.5 2ZM7.07095 5.64645C7.33397 5.44118 7.72049 5.47234 7.94645 5.72095L9.94645 7.98761C10.1557 8.22111 10.1324 8.57487 9.89889 8.78411L7.89889 10.5079C7.64831 10.7309 7.26563 10.7157 7.03558 10.4738C6.80553 10.2319 6.80652 9.85041 7.03838 9.60953L8.68413 8.17445L6.99355 6.25261C6.76759 6.00401 6.79875 5.61749 7.07095 5.64645ZM4.99996 5.5C5.27611 5.5 5.49996 5.72386 5.49996 6V9C5.49996 9.27614 5.27611 9.5 4.99996 9.5C4.72382 9.5 4.49996 9.27614 4.49996 9V6C4.49996 5.72386 4.72382 5.5 4.99996 5.5Z" fill="currentColor" fill-rule="evenodd" clip-rule="evenodd"></path></svg>
              </div>
            </div>
            <div class="rt-CalloutText">Your institution has been saved successfully!</div>
          </div>
          
          <div class="rt-Card">
            <div class="rt-Flex direction="column" gap="1">
              <div class="rt-Text weight="medium" id="saved-institution-name"></div>
              <div class="rt-Text size="1" color="gray" id="saved-institution-proxy"></div>
            </div>
          </div>
          
          <div class="rt-Flex gap="3" justify="end" mt="4">
            <button id="edit-button" class="rt-Button variant="outline">Edit</button>
            <button id="reset-button" class="rt-Button color="ruby">Reset</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
