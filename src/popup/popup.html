<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Academic Access Extension</title>
  <style>
    :root {
      --primary-color: #2c6bed;
      --primary-dark: #1d5cdb;
      --secondary-color: #f1f5fa;
      --success-color: #4caf50;
      --danger-color: #f44336;
      --text-color: #333;
      --text-light: #666;
      --box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
      --border-radius: 4px;
      --transition: all 0.3s ease;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      width: 360px;
      margin: 0;
      padding: 16px;
      color: var(--text-color);
      font-size: 14px;
      line-height: 1.5;
      background-color: #fff;
    }
    
    h1 {
      font-size: 18px;
      margin-top: 0;
      margin-bottom: 16px;
      text-align: center;
      color: var(--primary-color);
    }
    
    .logo {
      text-align: center;
      margin-bottom: 16px;
    }
    
    .logo img {
      height: 48px;
      width: auto;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .card {
      background-color: #fff;
      border-radius: var(--border-radius);
      padding: 16px;
      box-shadow: var(--box-shadow);
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }
    
    .input-group {
      position: relative;
    }
    
    .input-group .icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-light);
    }
    
    select,
    input[type="text"] {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: var(--border-radius);
      font-size: 14px;
      transition: var(--transition);
      box-sizing: border-box;
    }
    
    select:focus,
    input[type="text"]:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 2px rgba(44, 107, 237, 0.2);
    }
    
    .btn {
      display: inline-block;
      background-color: var(--primary-color);
      color: white;
      padding: 8px 16px;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      transition: var(--transition);
    }
    
    .btn:hover {
      background-color: var(--primary-dark);
    }
    
    .btn-block {
      display: block;
      width: 100%;
    }
    
    .btn-outline {
      background-color: transparent;
      border: 1px solid var(--primary-color);
      color: var(--primary-color);
    }
    
    .btn-outline:hover {
      background-color: var(--primary-color);
      color: white;
    }
    
    .btn-danger {
      background-color: var(--danger-color);
    }
    
    .btn-danger:hover {
      background-color: #d32f2f;
    }
    
    .btn-sm {
      padding: 4px 8px;
      font-size: 12px;
    }
    
    .btn-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    
    .alert {
      padding: 12px;
      border-radius: var(--border-radius);
      margin-bottom: 16px;
    }
    
    .alert-success {
      background-color: #e8f5e9;
      color: #2e7d32;
      border: 1px solid #c8e6c9;
    }
    
    .alert-info {
      background-color: #e3f2fd;
      color: #1565c0;
      border: 1px solid #bbdefb;
    }
    
    .hidden {
      display: none;
    }
    
    .text-center {
      text-align: center;
    }
    
    .mt-16 {
      margin-top: 16px;
    }
    
    .actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }
    
    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px;
      border-radius: var(--border-radius);
      background-color: var(--secondary-color);
    }
    
    .status-indicator .icon {
      font-size: 16px;
    }
    
    .status-indicator.active {
      background-color: #e8f5e9;
    }
    
    .status-indicator.active .icon {
      color: var(--success-color);
    }
    
    /* Tabs */
    .tabs {
      display: flex;
      border-bottom: 1px solid #ddd;
      margin-bottom: 16px;
    }
    
    .tab {
      padding: 8px 16px;
      cursor: pointer;
      font-weight: 500;
      color: var(--text-light);
      border-bottom: 2px solid transparent;
    }
    
    .tab.active {
      color: var(--primary-color);
      border-bottom-color: var(--primary-color);
    }
    
    /* Settings Section */
    #settings-section {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    
    .institution-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background-color: var(--secondary-color);
      border-radius: var(--border-radius);
    }
    
    .institution-info {
      display: flex;
      flex-direction: column;
    }
    
    .institution-name {
      font-weight: 500;
    }
    
    .institution-url {
      font-size: 12px;
      color: var(--text-light);
    }
    
    /* Custom University Form */
    #custom-form {
      margin-top: 16px;
      border-top: 1px solid #eee;
      padding-top: 16px;
    }
    
    .toggle-link {
      color: var(--primary-color);
      cursor: pointer;
      text-decoration: underline;
      font-size: 13px;
    }
    
    /* Loading spinner */
    .spinner {
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-top: 2px solid var(--primary-color);
      border-radius: 50%;
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
      display: inline-block;
      vertical-align: middle;
      margin-right: 8px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="logo">
    <img src="../assets/logo.png" alt="Academic Access Extension" onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgdmlld0JveD0iMCAwIDEwMCAxMDAiIGZpbGw9Im5vbmUiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHJlY3Qgd2lkdGg9IjEwMCIgaGVpZ2h0PSIxMDAiIHJ4PSI1MCIgZmlsbD0iIzJjNmJlZCIvPjxwYXRoIGQ9Ik0zMCA3MEg3ME02NSAzMEw1MCA3ME0zNSAzMEw1MCA3MCIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSI4IiBzdHJva2UtbGluZWNhcD0icm91bmQiIHN0cm9rZS1saW5lam9pbj0icm91bmQiLz48L3N2Zz4='">
  </div>
  <h1>Academic Access Extension</h1>
  
  <div class="container">
    <!-- Setup Section -->
    <div id="setup-section">
      <div class="card">
        <div id="alert-box" class="alert alert-info hidden">
          <span id="alert-message"></span>
        </div>
        
        <div id="university-select-container">
          <div class="form-group">
            <label for="university-select">Select your institution</label>
            <select id="university-select">
              <option value="">-- Select your university --</option>
              <option value="michigan">University of Michigan</option>
              <option value="harvard">Harvard University</option>
              <option value="stanford">Stanford University</option>
              <option value="mit">Massachusetts Institute of Technology</option>
              <option value="berkeley">UC Berkeley</option>
              <option value="oxford">University of Oxford</option>
              <option value="cambridge">University of Cambridge</option>
              <option value="yale">Yale University</option>
              <option value="princeton">Princeton University</option>
              <option value="custom">Custom Institution...</option>
            </select>
          </div>
          
          <div id="custom-form" class="hidden">
            <div class="form-group">
              <label for="custom-name">Institution Name</label>
              <input type="text" id="custom-name" placeholder="e.g., University of Example">
            </div>
            
            <div class="form-group">
              <label for="custom-proxy">Proxy URL or Suffix</label>
              <input type="text" id="custom-proxy" placeholder="e.g., https://proxy.example.edu/login?url= or .proxy.example.edu">
              <small>Enter your institution's proxy URL prefix or domain suffix.</small>
            </div>
          </div>
          
          <button id="save-button" class="btn btn-block mt-16">Save Settings</button>
        </div>
        
        <div id="success-message" class="hidden">
          <div class="alert alert-success">
            Your institution has been saved successfully!
          </div>
          
          <div class="institution-item">
            <div class="institution-info">
              <div class="institution-name" id="saved-institution-name"></div>
              <div class="institution-url" id="saved-institution-proxy"></div>
            </div>
          </div>
          
          <div class="actions mt-16">
            <button id="edit-button" class="btn btn-outline">Edit</button>
            <button id="reset-button" class="btn btn-danger">Reset</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
